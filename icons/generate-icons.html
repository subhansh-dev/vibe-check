<!-- 
  GENERATE-ICONS.HTML — Open this in a browser to generate PNG icons
  
  INSTRUCTIONS:
  1. Open this file in Chrome
  2. Click each "Download" button that appears
  3. Save the files as icon16.png, icon48.png, icon128.png in the icons/ folder
  
  This converts the SVG icon to the required PNG sizes.
-->
<!DOCTYPE html>
<html>
<head><title>Generate Vibe Check Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;">
  <h2>Vibe Check Icon Generator</h2>
  <p>Right-click each image below and "Save image as" to the icons/ folder.</p>
  
  <h3>icon128.png</h3>
  <canvas id="c128" width="128" height="128"></canvas>
  <br><a id="d128" download="icon128.png">Download icon128.png</a>
  
  <h3>icon48.png</h3>
  <canvas id="c48" width="48" height="48"></canvas>
  <br><a id="d48" download="icon48.png">Download icon48.png</a>
  
  <h3>icon16.png</h3>
  <canvas id="c16" width="16" height="16"></canvas>
  <br><a id="d16" download="icon16.png">Download icon16.png</a>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
      <rect x="16" y="20" width="96" height="72" rx="16" fill="#00E5FF" opacity="0.15"/>
      <rect x="16" y="20" width="96" height="72" rx="16" stroke="#00E5FF" stroke-width="4"/>
      <polygon points="36,92 52,92 40,108" fill="#00E5FF" opacity="0.15"/>
      <polygon points="36,92 52,92 40,108" stroke="#00E5FF" stroke-width="3" stroke-linejoin="round" fill="none"/>
      <polygon points="68,32 52,60 64,60 56,92 84,54 68,54 76,32" fill="#00E5FF"/>
    </svg>`;

    function render(canvas, link) {
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svg], {type:'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        link.href = canvas.toDataURL('image/png');
      };
      img.src = url;
    }

    render(document.getElementById('c128'), document.getElementById('d128'));
    render(document.getElementById('c48'), document.getElementById('d48'));
    render(document.getElementById('c16'), document.getElementById('d16'));
  </script>
</body>
</html>
