<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Vibe Check Icon: Chat bubble with lightning bolt -->
  <!-- Cyan on transparent -->
  
  <!-- Chat bubble -->
  <rect x="16" y="20" width="96" height="72" rx="16" fill="#00E5FF" opacity="0.15"/>
  <rect x="16" y="20" width="96" height="72" rx="16" stroke="#00E5FF" stroke-width="4"/>
  
  <!-- Bubble tail -->
  <polygon points="36,92 52,92 40,108" fill="#00E5FF" opacity="0.15"/>
  <polygon points="36,92 52,92 40,108" stroke="#00E5FF" stroke-width="3" stroke-linejoin="round" fill="none"/>
  
  <!-- Lightning bolt -->
  <polygon points="68,32 52,60 64,60 56,92 84,54 68,54 76,32" fill="#00E5FF"/>
  
</svg>
